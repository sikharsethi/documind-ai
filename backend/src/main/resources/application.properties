spring.application.name=documind-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/documind_db?TimeZone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.username=documind_user
spring.datasource.password=documind_pass

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

jwt.secret=documind-super-secret-key-which-is-long-enough-for-hs256-algorithm
jwt.expiration=86400000